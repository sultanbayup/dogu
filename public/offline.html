<!doctype html>
<html lang="en" class="dark" style="background:#09090B;color:#FAFAFA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unavailable Offline — Dogu</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #09090B;
        color: #FAFAFA;
        font-family: 'Geist', 'Inter', system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3rem;
        height: 3rem;
        border-radius: 0.75rem;
        background: #18181B;
        margin-bottom: 1.5rem;
      }
      .icon svg {
        width: 1.5rem;
        height: 1.5rem;
        stroke: #A1A1AA;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        letter-spacing: -0.02em;
      }
      p {
        color: #A1A1AA;
        margin-bottom: 2rem;
        line-height: 1.6;
        font-size: 0.9375rem;
      }
      a {
        display: inline-block;
        background: #2563EB;
        color: #FAFAFA;
        padding: 0.75rem 1.5rem;
        border-radius: 0.75rem;
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        min-width: 44px;
        min-height: 44px;
        transition: opacity 200ms cubic-bezier(0, 0, 0.2, 1);
      }
      a:hover {
        opacity: 0.8;
      }
      @media (prefers-reduced-motion: reduce) {
        a {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon" aria-hidden="true">
        <!-- wifi-off icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
      <h1>Unavailable offline</h1>
      <p>This tool hasn't been cached yet. Visit it once while online and it will be available offline next time.</p>
      <a href="/">Back to Dogu home</a>
    </div>
  </body>
</html>
